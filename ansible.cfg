[defaults]
callback_result_format = yaml
nocows = true
inventory = /home/ivan/Downloads/ansible/inventory.ini
collections_path = /home/ivan/ansible-learning-new/lib/python3.14/site-packages/ansible_collections
private_key_file = /home/ivan/.ssh/ansible
remote_user = ansible
become_method = doas
become_ask_pass = false
forks = 50
timeout = 30
gathering = smart
fact_caching = jsonfile
fact_caching_connection = ~/.ansible/facts_cache
fact_caching_timeout = 3600
interpreter_python = auto_silent
retry_files_save_path = /home/ivan/Downloads/ansible/retry_files

[ssh_connection]
pipelining = true
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o Compression=yes
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
