---
- name: Detect OS families and group hosts by OS
  hosts: webservers
  gather_facts: true
  become: false
  tasks:
    - name: Register OS family as a host fact
      ansible.builtin.set_fact:
        os_family: "{{ ansible_facts['os_family'] }}"
      args:
        cacheable: true
    - name: Add Debian hosts to debian_hosts group
      ansible.builtin.group_by:
        key: "debian_hosts"
      when: ansible_facts['os_family'] == "Debian"
    - name: Add Arch Linux hosts to archlinux_hosts group
      ansible.builtin.group_by:
        key: "archlinux_hosts"
      when: ansible_facts['os_family'] == "Archlinux"

- name: Update and upgrade packages on Debian-based systems
  hosts: debian_hosts
  become: true
  serial: 2
  tasks:
    - name: Update package cache on Debian
      ansible.builtin.apt:
        update_cache: true
      async: 300
      poll: 0
      register: debian_cache_job

    - name: Upgrade packages on Debian
      ansible.builtin.apt:
        upgrade: dist
      async: 300
      poll: 0
      register: debian_upgrade_job

    - name: Collect async job IDs for Debian tasks
      ansible.builtin.set_fact:
        debian_job_ids: "{{ [debian_cache_job.ansible_job_id, debian_upgrade_job.ansible_job_id] }}"

    - name: Wait for Debian async jobs to complete
      ansible.builtin.async_status:
        jid: "{{ item }}"
      register: job_result
      until: job_result.finished
      retries: 30
      delay: 10
      loop: "{{ debian_job_ids }}"
      loop_control:
        label: "{{ item }}"

    - name: Debug async job results for Debian
      ansible.builtin.debug:
        var: job_result

    - name: Verify async job results on Debian
      ansible.builtin.debug:
        msg: "Job {{ item.ansible_job_id }} completed successfully"
      when: "item.finished == 1"
      loop: "{{ job_result.results }}"

- name: Update and upgrade packages on Arch Linux-based systems
  hosts: archlinux_hosts
  become: true
  serial: 2
  tasks:
    - name: Update and upgrade packages on Arch Linux
      community.general.pacman:
        update_cache: true
        upgrade: true
      async: 300
      poll: 0
      register: arch_update_job

    - name: Collect async job ID for Arch Linux task
      ansible.builtin.set_fact:
        arch_job_ids: "{{ [arch_update_job.ansible_job_id] }}"

    - name: Wait for Arch Linux async jobs to complete
      ansible.builtin.async_status:
        jid: "{{ item }}"
      register: job_result
      until: job_result.finished
      retries: 30
      delay: 10
      loop: "{{ arch_job_ids }}"
      loop_control:
        label: "{{ item }}"

    - name: Debug async job results for Arch Linux
      ansible.builtin.debug:
        var: job_result

    - name: Verify async job results on Arch Linux
      ansible.builtin.debug:
        msg: "Job {{ item.ansible_job_id }} completed successfully"
      when: "item.finished == 1"
      loop: "{{ job_result.results }}"
