- name: Full upgrade using paru only
  hosts: kubernetes
  become: true
  gather_facts: false
  strategy: free
  serial: 0

  tasks:
    
    - name: Refresh package databases and check for upgrades
      become_user: ansible
      shell: paru -Sy > /dev/null && paru -Qu
      register: paru_upgrades
      changed_when: false
      failed_when: false

    - name: Check for available upgrades (repo + AUR)
      become_user: ansible
      shell: paru -Qu
      register: paru_upgrades
      changed_when: false
      failed_when: false

    - name: Show packages to be upgraded
      debug:
        msg: |
          Packages to upgrade:
          {{ paru_upgrades.stdout_lines | join('\n') }}
      when: paru_upgrades.stdout != ""

    - name: Upgrade all packages with paru
      become_user: ansible
      shell: paru -Syu --noconfirm
      args:
        executable: /bin/bash
      environment:
        LANG: C
        LC_ALL: C
      when: paru_upgrades.stdout != ""

